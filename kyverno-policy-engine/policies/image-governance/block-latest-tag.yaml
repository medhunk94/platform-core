apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: block-latest-tag
  annotations:
    policies.kyverno.io/title: Block Latest Image Tag
    policies.kyverno.io/category: Image Governance
    policies.kyverno.io/severity: high
    policies.kyverno.io/description: >-
      Blocks pods that use the ':latest' tag or no tag at all.
      Mutable tags make deployments non-reproducible — a redeploy after
      an upstream image change silently runs different code.
spec:
  validationFailureAction: Enforce
  background: true
  rules:
    - name: require-image-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - keda
                - monitoring
      validate:
        message: "All container images must have an explicit tag. Use nginx:1.25.3 not nginx or nginx:latest"
        pattern:
          spec:
            containers:
              - image: "*:*"

    - name: block-latest-tag
      match:
        any:
          - resources:
              kinds:
                - Pod
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kyverno
                - keda
                - monitoring
      validate:
        message: "Tag ':latest' is not allowed. Pin to an immutable tag e.g. nginx:1.25.3"
        pattern:
          spec:
            containers:
              - image: "!*:latest"
