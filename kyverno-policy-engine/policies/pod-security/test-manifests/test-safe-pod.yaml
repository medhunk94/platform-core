apiVersion: v1
kind: Pod
metadata:
  name: test-safe-pod
  namespace: test-kyverno
  labels:
    purpose: kyverno-policy-test
    expected-result: allowed
spec:
  # These settings satisfy all 5 pod security policies:
  # - hostNetwork/hostPID/hostIPC absent (defaults to false) → passes restrict-host-namespaces
  containers:
    - name: test-safe
      image: nginx:1.25.3
      securityContext:
        privileged: false                 # passes block-privileged-containers
        runAsNonRoot: true                # passes block-run-as-root
        allowPrivilegeEscalation: false   # passes disallow-privilege-escalation
        readOnlyRootFilesystem: true      # passes require-readonly-rootfs
      resources:
        requests:
          cpu: "100m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"                 # passes require-resource-limits
