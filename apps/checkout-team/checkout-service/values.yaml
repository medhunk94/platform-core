# Checkout Service - Production Configuration

name: checkout-service
namespace: checkout

image:
  repository: spring-boot-checkout-service
  tag: "1.0.0"
  pullPolicy: IfNotPresent

replicaCount: 3

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

healthCheck:
  livenessPath: /actuator/health/liveness
  readinessPath: /actuator/health/readiness
  initialDelaySeconds: 45
  periodSeconds: 10

config:
  SPRING_PROFILES_ACTIVE: "production"
  LOG_LEVEL: "INFO"
  ENVIRONMENT: "production"
  DATABASE_HOST: "postgres-checkout.checkout.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "checkout_db"
  ORDER_SERVICE_URL: "http://order-service.orders.svc.cluster.local:8080"
  PAYMENT_SERVICE_URL: "http://payment-service.payment.svc.cluster.local:8080"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_CHECKOUT: "checkout.events"
  SESSION_TIMEOUT: "1800"
  CART_EXPIRY_SECONDS: "3600"

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
