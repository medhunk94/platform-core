# Checkout Service - Production Configuration

name: checkout-service
namespace: checkout

image:
  repository: ghcr.io/medhunk94/checkout-service
  tag: "feature-systemcharts"
  pullPolicy: Always

replicaCount: 2

resources:
  requests:
    memory: "128Mi"
    cpu: "100m"
  limits:
    memory: "256Mi"
    cpu: "200m"

service:
  type: ClusterIP
  port: 8080
  targetPort: 8080

healthCheck:
  livenessPath: /health
  readinessPath: /ready
  initialDelaySeconds: 10
  periodSeconds: 10

config:
  PORT: "8080"
  KAFKA_BROKER: "kafka.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC: "order-topic"

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL
