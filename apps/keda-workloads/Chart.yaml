apiVersion: v2
name: keda-workloads
description: >-
  Event-driven autoscaling workloads managed by KEDA.
  Deploys a Kafka broker and a consumer Deployment with a ScaledObject
  that scales the consumer based on Kafka consumer group lag.
  The KEDA operator itself is installed separately by the platform team via Helm.
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - keda
  - kafka
  - autoscaling
  - event-driven
  - platform
maintainers:
  - name: platform-team
    email: platform@company.com
