---
# Consumer Deployment — the workload KEDA scales based on Kafka lag.
# In production, teams replace this with their actual consumer image and command.
# The placeholder image (eclipse-temurin) keeps the Deployment running so the
# ScaledObject has a valid scaleTargetRef to manage.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-processor
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: order-processor
    app.kubernetes.io/component: consumer
    app.kubernetes.io/managed-by: argocd
spec:
  replicas: {{ .Values.consumer.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: order-processor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: order-processor
        app.kubernetes.io/component: consumer
    spec:
      serviceAccountName: kafka-consumer-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000
      containers:
        - name: order-processor
          image: "{{ .Values.consumer.image.repository }}:{{ .Values.consumer.image.tag }}"
          command: ["sleep", "infinity"]
          env:
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.{{ .Values.namespace }}.svc.cluster.local:9092"
            - name: KAFKA_CONSUMER_GROUP
              value: {{ .Values.scaledobject.consumerGroup | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.kafka.topic | quote }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: {{ .Values.consumer.resources.requests.cpu }}
              memory: {{ .Values.consumer.resources.requests.memory }}
            limits:
              cpu: {{ .Values.consumer.resources.limits.cpu }}
              memory: {{ .Values.consumer.resources.limits.memory }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kafka-consumer-sa
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: kafka-consumer
    app.kubernetes.io/managed-by: argocd
automountServiceAccountToken: false
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: scaledobject-reader
  namespace: {{ .Values.namespace }}
rules:
  - apiGroups: ["keda.sh"]
    resources: ["scaledobjects", "scaledjobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["autoscaling"]
    resources: ["horizontalpodautoscalers"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: scaledobject-reader-binding
  namespace: {{ .Values.namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: scaledobject-reader
subjects:
  - kind: ServiceAccount
    name: kafka-consumer-sa
    namespace: {{ .Values.namespace }}
