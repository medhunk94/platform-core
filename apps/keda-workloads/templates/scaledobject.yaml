apiVersion: keda.sh/v1alpha1
kind: ScaledObject
metadata:
  name: order-processor-scaledobject
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: order-processor
    app.kubernetes.io/component: autoscaler
    app.kubernetes.io/managed-by: argocd
  annotations:
    # Sync wave 3 within this app — ScaledObject must deploy after the consumer Deployment
    argocd.argoproj.io/sync-wave: "3"
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: order-processor

  pollingInterval: 15
  cooldownPeriod: {{ .Values.scaledobject.cooldownPeriod }}
  minReplicaCount: {{ .Values.scaledobject.minReplicaCount }}
  maxReplicaCount: {{ .Values.scaledobject.maxReplicaCount }}

  advanced:
    restoreToOriginalReplicaCount: false
    horizontalPodAutoscalerConfig:
      name: order-processor-hpa
      behavior:
        scaleUp:
          stabilizationWindowSeconds: 0
          policies:
            - type: Percent
              value: 100
              periodSeconds: 30
            - type: Pods
              value: 5
              periodSeconds: 30
          selectPolicy: Max
        scaleDown:
          stabilizationWindowSeconds: 300
          policies:
            - type: Pods
              value: 2
              periodSeconds: 120

  triggers:
    - type: kafka
      metadata:
        bootstrapServers: "kafka.{{ .Values.namespace }}.svc.cluster.local:9092"
        consumerGroup: {{ .Values.scaledobject.consumerGroup | quote }}
        topic: {{ .Values.kafka.topic | quote }}
        lagThreshold: {{ .Values.scaledobject.lagThreshold | quote }}
        activationLagThreshold: {{ .Values.scaledobject.activationLagThreshold | quote }}
        offsetResetPolicy: latest
