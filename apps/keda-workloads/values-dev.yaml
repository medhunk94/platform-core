# Development overrides — reduced resources for local kind cluster

kafka:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi
  storage:
    size: 512Mi

consumer:
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

scaledobject:
  minReplicaCount: 0
  maxReplicaCount: 5      # lower ceiling in dev — don't spin up 20 pods on a laptop
  lagThreshold: "10"      # lower threshold so scaling triggers faster in demos
