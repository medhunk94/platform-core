# Production defaults
# Override per environment using values-<env>.yaml

# Controls whether policies block violations (Enforce) or only report them (Audit).
# Production: Enforce — admission webhook rejects non-compliant pods at the API server.
# Development: Audit  — violations appear in PolicyReport CRDs but pods are not blocked.
#                       Use this when rolling out a new policy to measure blast radius first.
enforcementMode: Enforce

# Namespaces excluded from ALL policies in this chart.
# These are infrastructure namespaces where third-party workloads run and may not
# comply with our security standards. Exclusions are intentional and documented here.
# Adding a new namespace to this list requires a PR and justification comment.
excludedNamespaces:
  - kube-system        # Kubernetes system components
  - kyverno            # Kyverno controllers themselves
  - keda               # KEDA operator controllers
  - monitoring         # Prometheus, Grafana — pre-existing workloads with fixed configs
  - argocd             # ArgoCD controllers
  - kafka              # Kafka broker — stateful, writes to data dirs (readOnlyRootFs incompatible)
