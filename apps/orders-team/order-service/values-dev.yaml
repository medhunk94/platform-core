# Order Service - Development Environment Overrides

# Keep at 0 for KEDA demo (scales from zero)
replicaCount: 0

# Lower resource requirements for kind cluster
resources:
  requests:
    memory: "64Mi"
    cpu: "50m"
  limits:
    memory: "128Mi"
    cpu: "100m"

# Development-specific configuration
config:
  KAFKA_BROKER: "kafka.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC: "dev-order-topic"
  CONSUMER_GROUP: "order-processor-group-dev"
