# Order Service - Development Environment Overrides

# Reduce replicas for local development
replicaCount: 1

# Lower resource requirements for kind cluster
resources:
  requests:
    memory: "256Mi"
    cpu: "250m"
  limits:
    memory: "512Mi"
    cpu: "500m"

# Development-specific configuration
config:
  SPRING_PROFILES_ACTIVE: "development"
  LOG_LEVEL: "DEBUG"
  ENVIRONMENT: "development"
  DATABASE_HOST: "postgres-orders.orders.svc.cluster.local"
  DATABASE_PORT: "5432"
  DATABASE_NAME: "orders_dev"
  KAFKA_BOOTSTRAP_SERVERS: "kafka.kafka.svc.cluster.local:9092"
  KAFKA_TOPIC_ORDERS: "dev.orders.events"
  CACHE_ENABLED: "false"
  DEBUG_MODE: "true"
