# AppProject: platform-team
#
# In production, AppProjects enforce team boundaries at the ArgoCD level — separate from
# Kubernetes RBAC. A team can only deploy FROM their allowed repos TO their allowed namespaces
# using only the resource types listed here. This prevents a team from accidentally (or
# maliciously) deploying into another team's namespace or creating cluster-admin bindings.
#
# Project-per-team pattern (typical enterprise layout):
#   platform-team  → owns: kyverno policies, keda workloads, monitoring configs
#   payment-team   → owns: payment-service, payment-worker  (namespaces: payment-*)
#   orders-team    → owns: order-api, order-processor        (namespaces: orders-*)
#   data-team      → owns: kafka, spark-jobs                 (namespaces: data-*)
#
# Key difference from a wildcard project (*): if payment-team tries to deploy into
# orders-* namespace, ArgoCD rejects it at the project layer before it reaches the cluster.

apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: platform-team
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  description: >-
    Platform engineering team — owns cluster-wide security policies (Kyverno),
    event-driven autoscaling (KEDA), and shared infrastructure workloads.

  # Only allow deployments from our official platform GitOps repo.
  # Adding another repo here requires a PR and review — no ad-hoc deployments.
  sourceRepos:
    - "https://github.com/medhunk94/platform-core.git"

  # Explicit destination namespaces — not wildcard.
  # If a new namespace is needed, it must be added here via PR.
  destinations:
    - namespace: kyverno
      server: https://kubernetes.default.svc
    - namespace: kafka
      server: https://kubernetes.default.svc
    - namespace: argocd
      server: https://kubernetes.default.svc
    - namespace: monitoring
      server: https://kubernetes.default.svc

  # Cluster-scoped resources this team is permitted to manage.
  # Kyverno ClusterPolicies and Namespace creation are the primary ones.
  clusterResourceWhitelist:
    - group: "kyverno.io"
      kind: ClusterPolicy
    - group: ""
      kind: Namespace
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRole
    - group: "rbac.authorization.k8s.io"
      kind: ClusterRoleBinding

  # Namespace-scoped resources this team can manage.
  # Explicitly enumerated — no wildcard group/kind.
  namespaceResourceWhitelist:
    - group: "apps"
      kind: StatefulSet
    - group: "apps"
      kind: Deployment
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: ResourceQuota
    - group: ""
      kind: LimitRange
    - group: "rbac.authorization.k8s.io"
      kind: Role
    - group: "rbac.authorization.k8s.io"
      kind: RoleBinding
    - group: "keda.sh"
      kind: ScaledObject
    - group: "keda.sh"
      kind: TriggerAuthentication
    - group: "networking.k8s.io"
      kind: NetworkPolicy

  # Warn when resources exist in the cluster that are not tracked in Git.
  # In production, set this to deny: true to block untracked resources entirely.
  orphanedResources:
    warn: true
