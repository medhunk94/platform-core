# Root Application — App of Apps pattern
#
# This is the bootstrap Application. Once applied, it watches the
# argocd/applications/ folder in Git and automatically creates every
# Application YAML it finds there.
#
# How it works:
#   1. You apply this one file manually (kubectl apply -f root-app.yaml)
#   2. ArgoCD sees it, syncs argocd/applications/ from Git
#   3. Every .yaml in that folder becomes a new ArgoCD Application
#   4. Those Applications in turn sync their own paths from Git
#   5. Future apps: just add a YAML to argocd/applications/, push, done.
#
# This means the entire platform is self-managing from a single git push.

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: root-app
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.io
spec:
  project: platform-team

  source:
    repoURL: https://github.com/medhunk94/platform-core.git
    targetRevision: feature/systemcharts
    # Watch this folder — any Application YAML added here gets created automatically
    path: argocd/applications

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd

  syncPolicy:
    automated:
      # Remove Applications from cluster if their YAML is deleted from Git
      prune: true
      # Re-sync if someone manually edits the Application object in the cluster
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
