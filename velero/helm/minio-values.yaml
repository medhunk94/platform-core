mode: standalone
replicas: 1

# Credentials — used by Velero to connect
rootUser: "minio-admin"
rootPassword: "minio-password"

# Pre-create the bucket Velero will use
buckets:
  - name: velero-backups
    policy: none
    purge: false

persistence:
  enabled: false

resources:
  requests:
    cpu: "250m"
    memory: "512Mi"
  limits:
    memory: "1Gi"

service:
  type: ClusterIP
  port: 9000

consoleService:
  type: ClusterIP
  port: 9001
